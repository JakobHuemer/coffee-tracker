<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <style>
    :root {
      --bg:           #FAF7F4;
      --surface:      #FFFFFF;
      --surface2:     #F4EDE6;
      --border:       #E8DDD3;
      --text-primary: #1C1410;
      --text-sec:     #6B5A4E;
      --text-muted:   #A08878;
      --accent:       #7C4A2D;
      --accent-bg:    #EDE0D6;
      --chart-bar:    rgba(124,74,45,0.85);
      --chart-hover:  rgba(111,59,30,1);
      --grid:         #EFE5DC;
      --tooltip-bg:   #FFFFFF;
      --tooltip-bd:   #E8DDD3;
      --shadow:       0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, header,
    .hero-tile, .card, .chart-card, .log-item, .bd-item,
    .log-count-pill, .hero-value, .theme-badge {
      transition: background-color 0.5s ease, border-color 0.5s ease,
                  color 0.4s ease, box-shadow 0.5s ease;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Background canvas ────────────────────────────── */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #shake-wrap {
      position: relative;
      z-index: 1;
      will-change: transform;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand .logo { font-size: 1.4rem; }
    .header-brand h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-brand .date { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

    .theme-badge {
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    /* ── Main layout ──────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Hero tiles ───────────────────────────────────── */
    .hero-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .hero-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .hero-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 1;
    }
    .hero-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .safe-indicator { font-size: 0.65rem; margin-top: 3px; font-weight: 600; }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Coffee selector ──────────────────────────────── */
    .coffee-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (min-width: 540px)  { .coffee-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 720px)  { .coffee-grid { grid-template-columns: repeat(7, 1fr); } }

    .coffee-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 14px 6px 12px;
      background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; color: var(--text-primary);
      transition: transform 0.12s, background 0.12s, border-color 0.12s;
    }
    .coffee-btn:hover { background: var(--accent-bg); border-color: var(--accent); transform: translateY(-2px); }
    .coffee-btn:active { transform: translateY(0) scale(0.97); }
    .coffee-btn.just-added { background: var(--accent-bg); border-color: var(--accent); }
    .coffee-btn .cb-icon { font-size: 1.6rem; line-height: 1; }
    .coffee-btn .cb-name { font-size: 0.67rem; font-weight: 600; text-align: center; line-height: 1.25; }
    .coffee-btn .cb-mg   { font-size: 0.62rem; color: var(--text-muted); }

    /* ── Log ──────────────────────────────────────────── */
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .log-count-pill { background: var(--accent-bg); color: var(--accent); font-size: 0.7rem; font-weight: 600; border-radius: 20px; padding: 3px 9px; }
    .log-list { display: flex; flex-direction: column; gap: 7px; }
    .log-empty { text-align: center; padding: 24px 0; color: var(--text-muted); font-size: 0.82rem; }
    .log-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--surface2); border-radius: 8px;
      animation: pop-in 0.18s ease;
    }
    @keyframes pop-in { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:translateY(0); } }
    .li-time { font-size: 0.72rem; color: var(--text-muted); min-width: 40px; font-variant-numeric: tabular-nums; }
    .li-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .li-name { flex: 1; font-size: 0.85rem; font-weight: 500; }
    .li-mg   { font-size: 0.7rem; color: var(--text-muted); }
    .li-del  {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 0.75rem; padding: 3px 5px; border-radius: 4px;
      opacity: 0; transition: opacity 0.12s, color 0.12s; line-height: 1;
    }
    .log-item:hover .li-del { opacity: 1; }
    .li-del:hover { color: #C0392B !important; }

    /* ── Charts ───────────────────────────────────────── */
    .charts-grid { display: grid; gap: 16px; }
    @media (min-width: 640px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px 14px; box-shadow: var(--shadow); }
    .chart-card.wide { grid-column: 1 / -1; }
    .chart-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
    .chart-sub   { font-size: 0.75rem; color: var(--text-sec); margin-top: 2px; margin-bottom: 14px; }
    .chart-wrap  { position: relative; height: 170px; }
    .chart-card.wide .chart-wrap { height: 190px; }

    /* ── Breakdown ────────────────────────────────────── */
    .breakdown-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    @media (min-width: 540px) { .breakdown-grid { grid-template-columns: repeat(4,1fr); } }
    @media (min-width: 720px) { .breakdown-grid { grid-template-columns: repeat(5,1fr); } }
    .bd-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; background: var(--surface2); border-radius: 8px; }
    .bd-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .bd-name  { flex: 1; font-size: 0.78rem; font-weight: 500; }
    .bd-count { font-size: 0.78rem; font-weight: 700; color: var(--accent); }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="shake-wrap">
  <header>
    <div class="header-brand">
      <span class="logo">☕</span>
      <div>
        <h1>Coffee Tracker</h1>
        <div class="date" id="hdr-date"></div>
      </div>
    </div>
    <span class="theme-badge" id="theme-badge">Serene</span>
  </header>

  <main>
    <div class="hero-row">
      <div class="hero-tile">
        <div class="hero-value" id="h-cups">0</div>
        <div class="hero-label">Today's cups</div>
      </div>
      <div class="hero-tile">
        <div class="hero-value" id="h-caf">0mg</div>
        <div class="hero-label">Caffeine today</div>
        <div class="safe-indicator" id="h-safe"></div>
      </div>
      <div class="hero-tile">
        <div class="hero-value" id="h-avg">0.0</div>
        <div class="hero-label">7-day avg / day</div>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Log a coffee</div>
      <div class="coffee-grid" id="coffee-grid"></div>
    </div>

    <div class="card">
      <div class="log-header">
        <div class="section-label" style="margin-bottom:0">Today's log</div>
        <span class="log-count-pill" id="log-pill">0 cups</span>
      </div>
      <div class="log-list" id="log-list"></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">Coffees per day</div>
        <div class="chart-sub">Last 14 days</div>
        <div class="chart-wrap"><canvas id="ch-day"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Coffees by hour</div>
        <div class="chart-sub">All-time pattern</div>
        <div class="chart-wrap"><canvas id="ch-hour"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Caffeine per day</div>
        <div class="chart-sub">Last 14 days · mg</div>
        <div class="chart-wrap"><canvas id="ch-caf"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="section-label">All-time by type</div>
      <div class="breakdown-grid" id="breakdown"></div>
    </div>
  </main>
</div>

<script>
// ── Coffee definitions ────────────────────────────────────────────────────────
const COFFEES = [
  { id: 'espresso',          name: 'Espresso',         caffeine: 63,  icon: '☕' },
  { id: 'espresso_mac',      name: 'Espresso Mac.',    caffeine: 63,  icon: '☕' },
  { id: 'doppio',            name: 'Doppio',            caffeine: 128, icon: '☕' },
  { id: 'lungo',             name: 'Lungo',             caffeine: 60,  icon: '☕' },
  { id: 'americano',         name: 'Americano',         caffeine: 95,  icon: '☕' },
  { id: 'cappuccino',        name: 'Cappuccino',        caffeine: 75,  icon: '☕' },
  { id: 'flat_white',        name: 'Flat White',        caffeine: 130, icon: '☕' },
  { id: 'latte',             name: 'Latte',             caffeine: 75,  icon: '🥛' },
  { id: 'latte_macchiato',   name: 'Latte Macchiato',   caffeine: 75,  icon: '🥛' },
  { id: 'affogato',          name: 'Affogato',          caffeine: 63,  icon: '🍨' },
  { id: 'frappuccino',       name: 'Frappuccino',       caffeine: 95,  icon: '🧋' },
  { id: 'chocochino',        name: 'Chocochino',        caffeine: 30,  icon: '🍫' },
  { id: 'hot_chocolate',     name: 'Hot Chocolate',     caffeine: 25,  icon: '🍫' },
];

// ── Caffeine-driven themes ────────────────────────────────────────────────────
// Two axes: background lightness (light→dark) and accent intensity (natural→electric→neon).
// Levels 0–3: light backgrounds, progressively warmer/redder.
// Level 4:    first dark background — the 500 mg crossing point.
// Levels 5–8: near-black, escalating electric hues.
// Level 9:    grey flatline — kept untouched.
const CAFFEINE_THEMES = [
  // 0 – Serene: clear morning, soft teal
  { threshold: 0,    label: 'Serene',        vars: { '--bg':'#EDF4F9','--surface':'#FFFFFF','--surface2':'#DCE8F2','--border':'#B8D4E8','--text-primary':'#0E2434','--text-sec':'#2C5870','--text-muted':'#6898B0','--accent':'#2A8FAB','--accent-bg':'#C8E4F0','--chart-bar':'rgba(42,143,171,0.85)','--chart-hover':'rgba(25,120,148,1)','--grid':'#D5E8F0','--tooltip-bg':'#FFFFFF','--tooltip-bd':'#B8D4E8','--shadow':'0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04)' } },
  // 1 – Normal: warm coffee cream
  { threshold: 100,  label: 'Normal',        vars: { '--bg':'#FAF7F4','--surface':'#FFFFFF','--surface2':'#F4EDE6','--border':'#E8DDD3','--text-primary':'#1C1410','--text-sec':'#6B5A4E','--text-muted':'#A08878','--accent':'#7C4A2D','--accent-bg':'#EDE0D6','--chart-bar':'rgba(124,74,45,0.85)','--chart-hover':'rgba(111,59,30,1)','--grid':'#EFE5DC','--tooltip-bg':'#FFFFFF','--tooltip-bd':'#E8DDD3','--shadow':'0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05)' } },
  // 2 – Approaching: warm golden buzz
  { threshold: 300,  label: '⚠ Approaching', vars: { '--bg':'#FDF8EA','--surface':'#FFFEF5','--surface2':'#FBF2C8','--border':'#F0E088','--text-primary':'#1A1000','--text-sec':'#7A6005','--text-muted':'#A89035','--accent':'#CC8A03','--accent-bg':'#FAF0BC','--chart-bar':'rgba(204,138,3,0.85)','--chart-hover':'rgba(174,115,0,1)','--grid':'#F5E89E','--tooltip-bg':'#FEFEF5','--tooltip-bd':'#F0E088','--shadow':'0 1px 3px rgba(100,80,0,.08), 0 4px 12px rgba(100,80,0,.06)' } },
  // 3 – Critical: light red, heart racing — last "light" level
  { threshold: 400,  label: '🚨 Critical',   vars: { '--bg':'#FDF5F5','--surface':'#FFFFFF','--surface2':'#FAE6E6','--border':'#F0BCBC','--text-primary':'#280808','--text-sec':'#903030','--text-muted':'#B07070','--accent':'#C0392B','--accent-bg':'#FAD2D2','--chart-bar':'rgba(192,57,43,0.85)','--chart-hover':'rgba(165,38,28,1)','--grid':'#F5D4D4','--tooltip-bg':'#FFF8F8','--tooltip-bd':'#F0BCBC','--shadow':'0 1px 3px rgba(150,0,0,.1), 0 4px 12px rgba(150,0,0,.08)' } },
  // 4 – Overdrive: CROSSES INTO DARK — near-black warm, vivid orange
  { threshold: 500,  label: '🔥 Overdrive',  vars: { '--bg':'#1E0A04','--surface':'#280E06','--surface2':'#341508','--border':'#5A2A10','--text-primary':'#FFD5B0','--text-sec':'#FF9050','--text-muted':'#904828','--accent':'#FF5C14','--accent-bg':'#4A1805','--chart-bar':'rgba(255,92,20,0.85)','--chart-hover':'rgba(255,135,65,1)','--grid':'#3A1A08','--tooltip-bg':'#1E0A04','--tooltip-bd':'#5A2A10','--shadow':'0 1px 4px rgba(0,0,0,.55), 0 4px 14px rgba(255,80,20,.18)' } },
  // 5 – Chaos: near-black deep purple, electric violet
  { threshold: 600,  label: '⚡ Chaos',      vars: { '--bg':'#120820','--surface':'#18102A','--surface2':'#201535','--border':'#3A2060','--text-primary':'#E8CCFF','--text-sec':'#B070E0','--text-muted':'#6040A0','--accent':'#B040F0','--accent-bg':'#2A1050','--chart-bar':'rgba(176,64,240,0.85)','--chart-hover':'rgba(205,105,255,1)','--grid':'#281845','--tooltip-bg':'#120820','--tooltip-bd':'#3A2060','--shadow':'0 1px 4px rgba(0,0,0,.65), 0 4px 14px rgba(140,40,220,.2)' } },
  // 6 – Wired: near-black with cyan tint — ICU monitor flatlining, defibrillator discharge
  { threshold: 700,  label: '⚡ Wired',       vars: { '--bg':'#00161A','--surface':'#001E24','--surface2':'#00282E','--border':'#004555','--text-primary':'#80F8FF','--text-sec':'#00C8D8','--text-muted':'#006070','--accent':'#00F0FF','--accent-bg':'#001C22','--chart-bar':'rgba(0,240,255,0.85)','--chart-hover':'rgba(80,255,255,1)','--grid':'#003040','--tooltip-bg':'#00161A','--tooltip-bd':'#004555','--shadow':'0 1px 4px rgba(0,0,0,.8), 0 4px 16px rgba(0,220,240,.22)' } },
  // 7 – Toxic: near-black, hot magenta — chemically wrong, nothing in nature is this color
  { threshold: 800,  label: '☢ Toxic',       vars: { '--bg':'#140010','--surface':'#1C0016','--surface2':'#280020','--border':'#4A0040','--text-primary':'#FF88D8','--text-sec':'#D5008A','--text-muted':'#7A0050','--accent':'#FF0090','--accent-bg':'#300018','--chart-bar':'rgba(255,0,144,0.85)','--chart-hover':'rgba(255,80,185,1)','--grid':'#2E0020','--tooltip-bg':'#140010','--tooltip-bd':'#4A0040','--shadow':'0 1px 4px rgba(0,0,0,.8), 0 4px 16px rgba(255,0,130,.22)' } },
  // 8 – Inferno: near-black dark red, neon fire
  { threshold: 900,  label: '💀 Inferno',    vars: { '--bg':'#0C0101','--surface':'#180202','--surface2':'#220404','--border':'#500808','--text-primary':'#FFB090','--text-sec':'#FF5020','--text-muted':'#A03010','--accent':'#FF2800','--accent-bg':'#300404','--chart-bar':'rgba(255,40,0,0.85)','--chart-hover':'rgba(255,88,38,1)','--grid':'#2A0404','--tooltip-bg':'#0C0101','--tooltip-bd':'#500808','--shadow':'0 1px 4px rgba(0,0,0,.8), 0 4px 16px rgba(255,30,0,.22)' } },
  // 9 – Gone: UNTOUCHED
  { threshold: 1000, label: '⬛ Gone',        vars: { '--bg':'#F3F3F3','--surface':'#FFFFFF','--surface2':'#E8E8E8','--border':'#CCCCCC','--text-primary':'#111111','--text-sec':'#555555','--text-muted':'#999999','--accent':'#444444','--accent-bg':'#DDDDDD','--chart-bar':'rgba(68,68,68,0.85)','--chart-hover':'rgba(36,36,36,1)','--grid':'#E0E0E0','--tooltip-bg':'#FFFFFF','--tooltip-bd':'#CCCCCC','--shadow':'0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05)' } },
];

// ── State ─────────────────────────────────────────────────────────────────────
let entries = [];
try { entries = JSON.parse(localStorage.getItem('coffee-entries') || '[]'); } catch {}
const charts = {};

function save() { localStorage.setItem('coffee-entries', JSON.stringify(entries)); }
function dateStr(ts) { return new Date(ts).toISOString().slice(0, 10); }
function todayStr()  { return new Date().toISOString().slice(0, 10); }
function todayEntries() { const t = todayStr(); return entries.filter(e => dateStr(e.ts) === t); }
function last14Days() {
  return Array.from({ length: 14 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (13 - i)); return d.toISOString().slice(0, 10);
  });
}
function todayCaffeine() {
  return todayEntries().reduce((s, e) => { const c = COFFEES.find(x => x.id === e.id); return s + (c ? c.caffeine : 0); }, 0);
}

// ── Background Animation ──────────────────────────────────────────────────────
const BG = (() => {
  let canvas, ctx, W, H, frame = 0, level = -1;
  let particles = [], pulseRings = [], bolts = [], matrixCols = [];
  let timers = [], anims = [];

  function init() {
    canvas = document.getElementById('bg-canvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(loop);
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    if (level === 6) buildMatrix();
  }

  function cleanup() {
    timers.forEach(t => { clearTimeout(t); clearInterval(t); });
    timers = [];
    anims.forEach(a => { try { a.pause(); } catch(_) {} });
    anims = [];
    const sw = document.getElementById('shake-wrap');
    anime.remove(sw);
    sw.style.transform = '';
    sw.style.filter = '';
    particles = []; pulseRings = []; bolts = [];
  }

  function setLevel(lv) {
    if (lv === level) return;
    cleanup();
    level = lv;
    const seeds = [12, 28, 45, 0, 55, 0, 80, 0, 80, 200];
    for (let i = 0; i < (seeds[lv] || 0); i++) spawn(true);
    if (lv === 3) initPulse();
    if (lv === 5) initLightning();
    if (lv >= 2 && lv <= 8) startShakeBursts(lv);
    if (lv === 9) initGlitch();
  }

  // ── Level 3: heartbeat pulse ──────────────────────────────────────────────
  function initPulse() {
    function beat() {
      if (level !== 3) return;
      pulseRings.push({ x: W / 2, y: H / 2, r: 10, alpha: 0.65, spd: 2.8 });
      timers.push(setTimeout(() => {
        if (level !== 3) return;
        pulseRings.push({ x: W / 2, y: H / 2, r: 10, alpha: 0.45, spd: 2.2 });
      }, 150));
      timers.push(setTimeout(beat, 950));
    }
    beat();
  }

  // ── Level 5: fractal lightning ────────────────────────────────────────────
  function initLightning() {
    function strike() {
      if (level !== 5) return;
      const n = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) bolts.push(makeBolt());
      timers.push(setTimeout(strike, 120 + Math.random() * 550));
    }
    strike();
  }

  function makeBolt() {
    const sx = Math.random() * W, sy = 0;
    const ex = sx + (Math.random() - 0.5) * W * 0.55;
    const ey = H * 0.25 + Math.random() * H * 0.5;
    return { segs: fracture(sx, sy, ex, ey, 5), life: 7, alpha: 1, w: 1.2 + Math.random() };
  }

  function fracture(x1, y1, x2, y2, d) {
    if (d === 0) return [[x1, y1, x2, y2]];
    const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * 90 / d;
    const my = (y1 + y2) / 2 + (Math.random() - 0.5) * 50 / d;
    const r = [...fracture(x1, y1, mx, my, d - 1), ...fracture(mx, my, x2, y2, d - 1)];
    if (d >= 3 && Math.random() < 0.35) {
      r.push(...fracture(mx, my, mx + (Math.random() - 0.5) * 180, my + 80 + Math.random() * 160, d - 2));
    }
    return r;
  }

  // ── Level 6: matrix rain ──────────────────────────────────────────────────
  const MCHARS = '☕01アイΔΨmg∞caffeine0Σ01☕αβ';
  function mkChar() { return MCHARS[Math.floor(Math.random() * MCHARS.length)]; }

  function buildMatrix() {
    const cw = 18, cols = Math.ceil(W / cw) + 1;
    matrixCols = Array.from({ length: cols }, (_, i) => ({
      x: i * cw + 4,
      y: -Math.random() * H * 1.8,
      spd: 1.8 + Math.random() * 4.5,
      len: 7 + Math.floor(Math.random() * 20),
      chars: Array.from({ length: Math.ceil(H / 18) + 5 }, mkChar),
    }));
  }

  // ── Progressive shake bursts (levels 2–8) ────────────────────────────────
  //   Each level: higher magnitude, more keyframes, shorter interval between bursts.
  const SHAKE_CFG = {
    2: { mag: 2,  keys: 2, minMs: 4000, maxMs: 9000 }, // barely a tremble
    3: { mag: 3,  keys: 3, minMs: 900,  maxMs: 900  }, // heartbeat-locked thud
    4: { mag: 5,  keys: 4, minMs: 1400, maxMs: 3200 }, // jittery
    5: { mag: 8,  keys: 5, minMs: 550,  maxMs: 1400 }, // erratic jolts
    6: { mag: 11, keys: 6, minMs: 280,  maxMs: 750  }, // rough turbulence
    7: { mag: 14, keys: 7, minMs: 130,  maxMs: 400  }, // violent thrash
    8: { mag: 18, keys: 9, minMs: 35,   maxMs: 150  }, // near-continuous seizure
  };

  function startShakeBursts(lv) {
    const cfg = SHAKE_CFG[lv];
    if (!cfg) return;

    function burst() {
      if (level !== lv) return;
      const kf = [];
      for (let i = 0; i < cfg.keys; i++) {
        kf.push({
          translateX: rnd(-cfg.mag, cfg.mag),
          translateY: rnd(-cfg.mag * 0.5, cfg.mag * 0.5),
          duration: 38 + Math.random() * 28,
        });
      }
      kf.push({ translateX: 0, translateY: 0, duration: 75 });

      anims.push(anime({
        targets: '#shake-wrap', keyframes: kf, easing: 'linear',
        complete: () => {
          if (level === lv)
            timers.push(setTimeout(burst, cfg.minMs + Math.random() * (cfg.maxMs - cfg.minMs)));
        },
      }));

      // Level 3: a soft second thump 150ms later to match the double heartbeat
      if (lv === 3) {
        timers.push(setTimeout(() => {
          if (level !== 3) return;
          anims.push(anime({
            targets: '#shake-wrap',
            keyframes: [
              { translateX: rnd(-2, 2), translateY: rnd(-1, 1), duration: 38 },
              { translateX: 0, translateY: 0, duration: 65 },
            ],
            easing: 'linear',
          }));
        }, 160));
      }
    }

    // Stagger first burst so not everything fires at t=0
    timers.push(setTimeout(burst, cfg.minMs * 0.25 + Math.random() * cfg.minMs * 0.5));
  }

  // ── Level 9: glitch ───────────────────────────────────────────────────────
  function initGlitch() {
    function doGlitch() {
      if (level !== 9) return;
      const a = anime({
        targets: '#shake-wrap',
        keyframes: [
          { translateX: -10, filter: 'hue-rotate(90deg) brightness(1.5) saturate(0)', duration: 35 },
          { translateX:   7, filter: 'hue-rotate(-60deg) brightness(0.6) saturate(0)', duration: 35 },
          { translateX:  -4, filter: 'hue-rotate(20deg) brightness(1.2) saturate(0)', duration: 35 },
          { translateX:   0, filter: 'none', duration: 50 },
        ],
        easing: 'steps(1)',
        complete: () => { timers.push(setTimeout(doGlitch, 400 + Math.random() * 1800)); },
      });
      anims.push(a);
    }
    timers.push(setTimeout(doGlitch, 600 + Math.random() * 1000));
  }

  // ── Particle spawner ──────────────────────────────────────────────────────
  function rnd(a, b) { return a + Math.random() * (b - a); }

  function spawn(init = false) {
    const p = { lv: level };
    switch (level) {
      case 0: // Serene — drifting glowing orbs
        Object.assign(p, { x: rnd(0,W), y: init ? rnd(0,H) : H+80, r: rnd(50,150),
          vx: rnd(-0.25,0.25), vy: rnd(-0.15,-0.06), alpha: rnd(0.012,0.04),
          hue: rnd(185,215), ph: rnd(0,6.28) });
        break;
      case 1: // Normal — steam wisps
        Object.assign(p, { x: rnd(0,W), y: init ? rnd(0,H) : H+15, r: rnd(4,9),
          vy: rnd(-0.5,-0.2), alpha: rnd(0.04,0.1), ph: rnd(0,6.28), phv: rnd(0.012,0.025), life: 1 });
        break;
      case 2: // Approaching — amber star sparkles
        Object.assign(p, { x: rnd(0,W), y: init ? rnd(0,H) : H+10, r: rnd(2,4.5),
          vx: rnd(-1.2,1.2), vy: rnd(-1.8,-0.6), alpha: rnd(0.35,0.75),
          rot: rnd(0,6.28), rotv: rnd(-0.08,0.08), life: 1 });
        break;
      case 4: // Overdrive — embers
        Object.assign(p, { x: rnd(W*0.05, W*0.95), y: init ? rnd(0,H) : H+8, r: rnd(1.5,4),
          vx: rnd(-2.5,2.5), vy: rnd(-7,-3), grav: rnd(0.05,0.1),
          alpha: rnd(0.6,1), hue: rnd(8,50), life: 1 });
        break;
      case 6: { // Wired — nerve-storm sparks: random direction, very fast, very short-lived
        const a6 = rnd(0, Math.PI * 2), s6 = 3 + rnd(0, 9);
        Object.assign(p, { x: rnd(0,W), y: rnd(0,H),
          r: 0.8 + rnd(0, 1.8),
          vx: Math.cos(a6) * s6, vy: Math.sin(a6) * s6,
          alpha: 0.6 + rnd(0, 0.4), life: 0.3 + rnd(0, 0.5) });
        break;
      }
      case 7: // Toxic — explosion shard (burst-spawned from update, not here)
        Object.assign(p, { x: rnd(0,W), y: rnd(0,H), r: 2 + rnd(0, 5),
          vx: rnd(-7,7), vy: rnd(-7,7), alpha: 0.7 + rnd(0, 0.3), life: 1 });
        break;
      case 8: // Inferno — fire
        Object.assign(p, { x: rnd(0,W), y: init ? rnd(0,H) : H+10, r: rnd(4,10),
          vx: rnd(-5,5), vy: rnd(-12,-4), grav: 0.04,
          alpha: rnd(0.4,0.85), hue: rnd(0,45), life: 1 });
        break;
      case 9: // Gone — static pixels
        Object.assign(p, { x: rnd(0,W), y: init ? rnd(0,H) : H+5, r: rnd(1,3),
          vx: rnd(-0.8,0.8), vy: rnd(-0.4,-0.1),
          alpha: rnd(0.05,0.25), flk: rnd(0,6.28), life: 1 });
        break;
    }
    particles.push(p);
  }

  // ── Update ────────────────────────────────────────────────────────────────
  function update() {
    frame++;

    // Per-frame spawn rates
    const rates = [0.04, 0.14, 0.24, 0, 0.5, 0, 7, 0, 1.1, 2.2];
    const r = rates[level] || 0;
    const whole = Math.floor(r);
    for (let i = 0; i < whole; i++) spawn();
    if (Math.random() < (r - whole)) spawn();

    // Update + cull particles
    const maxP = [50, 90, 130, 0, 160, 0, 300, 200, 220, 380];
    particles = particles.filter(p => {
      if (p.lv !== level) return false;
      switch (p.lv) {
        case 0:
          p.x += p.vx + Math.sin(frame * 0.007 + p.ph) * 0.5; p.y += p.vy;
          if (p.y < -p.r * 2) { p.y = H + p.r; p.x = Math.random() * W; }
          return true;
        case 1:
          p.ph += p.phv; p.x += Math.sin(p.ph) * 0.9; p.y += p.vy;
          p.life -= 0.003; p.alpha = p.life * 0.09;
          return p.life > 0 && p.y > -30;
        case 2:
          p.x += p.vx; p.y += p.vy; p.rot += p.rotv;
          p.life -= 0.006; p.alpha = p.life * 0.65;
          return p.life > 0;
        case 4:
          p.vy += p.grav; p.x += p.vx; p.y += p.vy;
          p.life -= 0.01; p.alpha = p.life * 0.9;
          return p.life > 0 && p.y < H + 25;
        case 6: // Nerve storm — straight-line flight, fade fast
          p.x += p.vx; p.y += p.vy;
          p.life -= 0.04; p.alpha = p.life * 0.85;
          return p.life > 0;
        case 7: // Toxic splatter — decelerate, fade medium
          p.x += p.vx; p.y += p.vy;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= 0.025; p.alpha = p.life * 0.8;
          return p.life > 0;
        case 8:
          p.vy += p.grav; p.x += p.vx; p.y += p.vy;
          p.r *= 0.987; p.life -= 0.014; p.alpha = p.life * 0.8;
          return p.life > 0 && p.y < H + 30;
        case 9:
          p.x += p.vx; p.y += p.vy; p.flk += 0.18;
          p.life -= 0.0028;
          p.alpha = Math.max(0, (0.4 + Math.sin(p.flk) * 0.3) * p.life * 0.35);
          if (p.y < 0) { p.y = H; p.x = Math.random() * W; p.life = 0.8 + Math.random() * 0.2; }
          return p.life > 0;
      }
      return true;
    });
    if (particles.length > (maxP[level] || 0)) particles.splice(0, particles.length - (maxP[level] || 0));

    // Pulse rings
    pulseRings = pulseRings.filter(r => { r.r += r.spd; r.alpha -= 0.009; return r.alpha > 0; });

    // Bolts
    bolts = bolts.filter(b => { b.life--; b.alpha = b.life / 7; return b.life > 0; });

    // Toxic burst explosions — spawn a ring of shards from a random point every 15 frames
    if (level === 7 && frame % 15 === 0) {
      const bx = rnd(W * 0.1, W * 0.9), by = rnd(H * 0.1, H * 0.9);
      const cnt = 8 + Math.floor(rnd(0, 10));
      for (let i = 0; i < cnt; i++) {
        const ang = (i / cnt) * Math.PI * 2 + rnd(-0.4, 0.4), spd = 2 + rnd(0, 7);
        particles.push({ lv: 7, x: bx, y: by, r: 2 + rnd(0, 5),
          vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
          alpha: 0.7 + rnd(0, 0.3), life: 1 });
      }
    }
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw() {
    ctx.clearRect(0, 0, W, H);
    switch (level) {
      case 0: drawSerene();    break;
      case 1: drawSteam();     break;
      case 2: drawSparkles();  break;
      case 3: drawPulse();     break;
      case 4: drawEmbers();    break;
      case 5: drawLightning(); break;
      case 6: drawWired();     break;
      case 7: drawToxic();     break;
      case 8: drawInferno();   break;
      case 9: drawGone();      break;
    }
  }

  function drawSerene() {
    particles.forEach(p => {
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0,   `hsla(${p.hue},55%,65%,${p.alpha * 3})`);
      g.addColorStop(0.5, `hsla(${p.hue},55%,65%,${p.alpha})`);
      g.addColorStop(1,   `hsla(${p.hue},55%,65%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
    });
  }

  function drawSteam() {
    particles.forEach(p => {
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      g.addColorStop(0,   `rgba(215,198,182,${p.alpha * 1.6})`);
      g.addColorStop(0.4, `rgba(215,198,182,${p.alpha})`);
      g.addColorStop(1,   'rgba(215,198,182,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 5, 0, 6.28); ctx.fill();
    });
  }

  function drawSparkles() {
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.shadowColor = `rgba(255,190,0,${p.alpha * 0.7})`; ctx.shadowBlur = 8;
      ctx.fillStyle = `rgba(196,144,8,${p.alpha})`;
      const s = p.r;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const r2 = i % 2 === 0 ? s * 2.2 : s * 0.9;
        i === 0 ? ctx.moveTo(Math.cos(a)*r2, Math.sin(a)*r2) : ctx.lineTo(Math.cos(a)*r2, Math.sin(a)*r2);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    });
  }

  function drawPulse() {
    const pulse = 0.5 + Math.sin(frame * 0.07) * 0.5;
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.55);
    bg.addColorStop(0, `rgba(192,57,43,${pulse * 0.06})`);
    bg.addColorStop(1, 'rgba(192,57,43,0)');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    pulseRings.forEach(r => {
      ctx.save();
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 6.28);
      ctx.strokeStyle = `rgba(192,57,43,${r.alpha})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = `rgba(255,60,60,${r.alpha * 0.6})`; ctx.shadowBlur = 12;
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawEmbers() {
    particles.forEach(p => {
      ctx.save();
      ctx.shadowColor = `hsla(${p.hue},100%,60%,${p.alpha * 0.5})`; ctx.shadowBlur = 10;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
      g.addColorStop(0,   `hsla(${Math.min(60,p.hue+25)},100%,92%,${p.alpha})`);
      g.addColorStop(0.35,`hsla(${p.hue},100%,62%,${p.alpha * 0.8})`);
      g.addColorStop(1,   `hsla(${Math.max(0,p.hue-5)},100%,38%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 3, 0, 6.28); ctx.fill();
      ctx.restore();
    });
  }

  function drawLightning() {
    const maxLife = bolts.reduce((m, b) => Math.max(m, b.life > 4 ? b.alpha : 0), 0);
    if (maxLife > 0) {
      ctx.fillStyle = `rgba(170,90,255,${maxLife * 0.05})`; ctx.fillRect(0, 0, W, H);
    }
    bolts.forEach(bolt => {
      ctx.save();
      // glow pass
      ctx.strokeStyle = `rgba(200,120,255,${bolt.alpha * 0.35})`;
      ctx.lineWidth = bolt.w * 7;
      ctx.shadowColor = `rgba(180,80,255,${bolt.alpha})`; ctx.shadowBlur = 22;
      bolt.segs.forEach(([x1,y1,x2,y2]) => { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
      // core
      ctx.strokeStyle = `rgba(228,190,255,${bolt.alpha * 0.95})`;
      ctx.lineWidth = bolt.w; ctx.shadowBlur = 5;
      bolt.segs.forEach(([x1,y1,x2,y2]) => { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
      // bright spine
      ctx.strokeStyle = `rgba(255,255,255,${bolt.alpha * 0.55})`;
      ctx.lineWidth = 0.5; ctx.shadowBlur = 0;
      bolt.segs.forEach(([x1,y1,x2,y2]) => { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
      ctx.restore();
    });
  }

  function drawWired() {
    // Random full-screen electric flash
    if (Math.random() < 0.06) {
      ctx.fillStyle = `rgba(0,240,255,${rnd(0.02, 0.07)})`; ctx.fillRect(0, 0, W, H);
    }
    // Horizontal interference lines — like a monitor going haywire
    if (Math.random() < 0.14) {
      for (let i = 0; i < 1 + Math.floor(Math.random() * 2); i++) {
        const iy = rnd(0, H), iw = W * rnd(0.2, 1.0);
        ctx.fillStyle = `rgba(0,240,255,${rnd(0.05, 0.14)})`; ctx.fillRect(0, iy, iw, 1 + Math.random() * 2);
      }
    }
    // Spark particles — cyan core with white-hot centre
    particles.forEach(p => {
      ctx.save();
      ctx.shadowColor = `rgba(0,240,255,${p.alpha * 0.9})`; ctx.shadowBlur = 10;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0,    `rgba(220,255,255,${p.alpha})`);
      g.addColorStop(0.35, `rgba(0,240,255,${p.alpha * 0.8})`);
      g.addColorStop(1,    `rgba(0,160,200,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, 6.28); ctx.fill();
      ctx.restore();
    });
  }

  function drawToxic() {
    // Arrhythmic background throb — the screen itself feels like it has a wrong heartbeat
    const pulse = 0.5 + Math.sin(frame * 0.19) * 0.5;
    ctx.fillStyle = `rgba(255,0,144,${0.02 + pulse * 0.04})`; ctx.fillRect(0, 0, W, H);

    // Explosion shard particles — bright magenta fragments flying outward
    particles.forEach(p => {
      ctx.save();
      ctx.shadowColor = `rgba(255,0,144,${p.alpha})`; ctx.shadowBlur = 18;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3.5);
      g.addColorStop(0,    `rgba(255,200,240,${p.alpha})`);
      g.addColorStop(0.25, `rgba(255,0,144,${p.alpha * 0.85})`);
      g.addColorStop(1,    `rgba(180,0,80,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 3.5, 0, 6.28); ctx.fill();
      ctx.restore();
    });

    // Flash on burst frames — a visible chemical detonation pop
    if (frame % 15 === 0 && Math.random() < 0.45) {
      ctx.fillStyle = `rgba(255,0,144,${rnd(0.05, 0.12)})`; ctx.fillRect(0, 0, W, H);
    }
  }

  function drawInferno() {
    const bg = ctx.createLinearGradient(0, H * 0.55, 0, H);
    bg.addColorStop(0, 'rgba(255,90,0,0)');
    bg.addColorStop(0.65, 'rgba(255,60,0,0.07)');
    bg.addColorStop(1, 'rgba(200,20,0,0.14)');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    particles.forEach(p => {
      ctx.save();
      ctx.shadowColor = `hsla(${p.hue},100%,50%,${p.alpha * 0.55})`; ctx.shadowBlur = 18;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0,    `hsla(60,100%,96%,${p.alpha})`);
      g.addColorStop(0.2,  `hsla(45,100%,76%,${p.alpha * 0.9})`);
      g.addColorStop(0.55, `hsla(${p.hue},100%,54%,${p.alpha * 0.55})`);
      g.addColorStop(1,    `hsla(${Math.max(0,p.hue-5)},100%,30%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, 6.28); ctx.fill();
      ctx.restore();
    });
  }

  function drawGone() {
    // scanlines
    for (let y = 0; y < H; y += 4) {
      ctx.fillStyle = 'rgba(0,0,0,0.03)'; ctx.fillRect(0, y, W, 1);
    }
    // static pixels
    particles.forEach(p => {
      ctx.fillStyle = `rgba(155,155,155,${p.alpha})`;
      ctx.fillRect(p.x, p.y, p.r, p.r * (0.4 + Math.random() * 0.6));
    });
    // glitch strips
    if (Math.random() < 0.045) {
      const gy = Math.random() * H, gh = 2 + Math.random() * 7, gs = (Math.random()-0.5)*45;
      try {
        const img = ctx.getImageData(0, gy, W, gh);
        ctx.putImageData(img, gs, gy);
      } catch(_) {}
    }
  }

  function loop() {
    if (level >= 0) { update(); draw(); }
    requestAnimationFrame(loop);
  }

  return { init, setLevel };
})();

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme() {
  const caf = todayCaffeine();
  let idx = 0;
  for (let i = 0; i < CAFFEINE_THEMES.length; i++) { if (caf >= CAFFEINE_THEMES[i].threshold) idx = i; }

  const theme = CAFFEINE_THEMES[idx];
  const root = document.documentElement;
  for (const [k, v] of Object.entries(theme.vars)) root.style.setProperty(k, v);
  document.getElementById('theme-badge').textContent = theme.label;
  BG.setLevel(idx);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addCoffee(id) {
  entries.push({ id, ts: Date.now() }); save(); refresh();
  const btn = document.querySelector(`[data-cid="${id}"]`);
  btn.classList.add('just-added'); setTimeout(() => btn.classList.remove('just-added'), 350);
}
function removeEntry(ts) { entries = entries.filter(e => e.ts !== ts); save(); refresh(); }

// ── Render ────────────────────────────────────────────────────────────────────
function renderButtons() {
  document.getElementById('coffee-grid').innerHTML = COFFEES.map(c => `
    <button class="coffee-btn" data-cid="${c.id}" onclick="addCoffee('${c.id}')">
      <span class="cb-icon">${c.icon}</span>
      <span class="cb-name">${c.name}</span>
      <span class="cb-mg">${c.caffeine}mg</span>
    </button>`).join('');
}

function renderHeroes() {
  const today = todayEntries();
  document.getElementById('h-cups').textContent = today.length;
  const caf = todayCaffeine();
  document.getElementById('h-caf').textContent = caf + 'mg';
  const pct = caf / 400, safe = document.getElementById('h-safe');
  if (!caf) { safe.textContent = ''; }
  else if (pct < 0.75) { safe.style.color = '#4CAF50'; safe.textContent = `✓ ${Math.round(pct*100)}% of daily limit`; }
  else if (pct < 1)    { safe.style.color = '#FF9800'; safe.textContent = `⚠ ${Math.round(pct*100)}% of daily limit`; }
  else                 { safe.style.color = '#E53935'; safe.textContent = `✕ Over 400mg limit`; }
  const cutoff = Date.now() - 7*864e5, byDay = {};
  entries.filter(e => e.ts >= cutoff).forEach(e => { const d = dateStr(e.ts); byDay[d] = (byDay[d]||0)+1; });
  document.getElementById('h-avg').textContent = (Object.values(byDay).reduce((a,b)=>a+b,0)/7).toFixed(1);
}

function renderLog() {
  const today = todayEntries().slice().sort((a,b) => b.ts - a.ts);
  document.getElementById('log-pill').textContent = today.length === 1 ? '1 cup' : `${today.length} cups`;
  const list = document.getElementById('log-list');
  if (!today.length) { list.innerHTML = '<div class="log-empty">No coffee logged yet today. Click a drink above to start.</div>'; return; }
  list.innerHTML = today.map(e => {
    const c = COFFEES.find(x => x.id === e.id);
    const time = new Date(e.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return `<div class="log-item">
      <span class="li-time">${time}</span><span class="li-dot"></span>
      <span class="li-name">${c.name}</span><span class="li-mg">${c.caffeine}mg</span>
      <button class="li-del" onclick="removeEntry(${e.ts})" title="Remove">✕</button>
    </div>`;
  }).join('');
}

function renderBreakdown() {
  const counts = {}; COFFEES.forEach(c => { counts[c.id] = 0; });
  entries.forEach(e => { if (counts[e.id] !== undefined) counts[e.id]++; });
  document.getElementById('breakdown').innerHTML = COFFEES.slice().sort((a,b) => counts[b.id]-counts[a.id]).map(c => `
    <div class="bd-item"><span class="bd-dot"></span><span class="bd-name">${c.name}</span><span class="bd-count">${counts[c.id]}</span></div>`).join('');
}

function chartColors() {
  const s = getComputedStyle(document.documentElement), g = v => s.getPropertyValue(v).trim();
  return { bar: g('--chart-bar'), hover: g('--chart-hover'), grid: g('--grid'),
           tick: g('--text-muted'), ttBg: g('--tooltip-bg'), ttBd: g('--tooltip-bd'), ttTxt: g('--text-sec') };
}

function baseOptions(cc, lFn) {
  return {
    responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
    plugins: {
      legend: { display: false },
      tooltip: { backgroundColor: cc.ttBg, titleColor: cc.ttTxt, bodyColor: cc.ttTxt,
        borderColor: cc.ttBd, borderWidth: 1, padding: 8, cornerRadius: 6,
        callbacks: lFn ? { label: ctx => lFn(ctx.raw) } : {} },
    },
    scales: {
      x: { grid: { color: cc.grid, lineWidth: 1 }, ticks: { color: cc.tick, font: { size: 11 } }, border: { display: false } },
      y: { grid: { color: cc.grid, lineWidth: 1 }, ticks: { color: cc.tick, font: { size: 11 }, precision: 0 }, border: { display: false }, beginAtZero: true },
    },
  };
}

function mkBar(data, cc) {
  return { data, backgroundColor: cc.bar, hoverBackgroundColor: cc.hover, borderRadius: 4, borderSkipped: false, borderWidth: 0 };
}

function renderCharts() {
  const cc = chartColors(), days = last14Days();
  const dl = days.map(d => new Date(d+'T12:00:00').toLocaleDateString([], { month:'short', day:'numeric' }));
  if (charts.day)  charts.day.destroy();
  if (charts.hour) charts.hour.destroy();
  if (charts.caf)  charts.caf.destroy();

  charts.day = new Chart(document.getElementById('ch-day'), {
    type: 'bar',
    data: { labels: dl, datasets: [mkBar(days.map(d => entries.filter(e => dateStr(e.ts)===d).length), cc)] },
    options: baseOptions(cc, v => `${v} cup${v!==1?'s':''}`),
  });

  const hc = Array(24).fill(0);
  entries.forEach(e => { hc[new Date(e.ts).getHours()]++; });
  const hl = Array.from({length:24},(_,i) => i===0?'12a':i<12?`${i}a`:i===12?'12p':`${i-12}p`);
  charts.hour = new Chart(document.getElementById('ch-hour'), {
    type: 'bar', data: { labels: hl, datasets: [mkBar(hc, cc)] },
    options: baseOptions(cc, v => `${v} cup${v!==1?'s':''}`),
  });

  charts.caf = new Chart(document.getElementById('ch-caf'), {
    type: 'bar',
    data: { labels: dl, datasets: [mkBar(days.map(d =>
      entries.filter(e => dateStr(e.ts)===d).reduce((s,e) => { const c=COFFEES.find(x=>x.id===e.id); return s+(c?c.caffeine:0); },0)
    ), cc)] },
    options: baseOptions(cc, v => `${v}mg caffeine`),
  });
}

function refresh() { applyTheme(); renderHeroes(); renderLog(); renderBreakdown(); renderCharts(); }

(function init() {
  document.getElementById('hdr-date').textContent = new Date().toLocaleDateString([],
    { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  renderButtons();
  BG.init();
  refresh();
})();
</script>
</body>
</html>
